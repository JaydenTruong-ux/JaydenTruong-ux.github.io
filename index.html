<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jayden Truong Portfolio</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">

<style>
/* --- Body & Theme --- */
body {
  margin: 0;
  font-family: 'Comfortaa', cursive;
  background: linear-gradient(135deg,#F2E4E7,#B7C9B6);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding-bottom: 50px;
}

/* --- Navigation Bar --- */
nav {
  background: #B7C9B6;
  width: 100%;
  padding: 20px 0;
}

nav ul {
  display: flex;
  justify-content: center;
  gap: 50px;
  list-style: none;
  margin: 0;
  padding: 0;
}

nav ul li a {
  text-decoration: none;
  color: #4f5f52;
  font-weight: bold;
  transition: color 0.2s;
}

nav ul li a:hover {
  color: #F2E4E7;
}

/* --- Intro Name Animation --- */
#name {
  font-family:'Press Start 2P', cursive;
  font-size: 40px;
  color: #4f5f52;
  text-align: center;
  margin-top: 50px;
  line-height: 1.6;
}

.cursor {
  border-right: 4px solid #4f5f52;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { border-color: transparent; }
  50% { border-color: #4f5f52; }
  100% { border-color: transparent; }
}

/* --- Experience Cards --- */
.cards-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  margin-top: 50px;
}

.experience-card {
  background: #E3F0E1;
  width: 250px;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.experience-card:hover {
  transform: translateY(-5px);
  box-shadow: 4px 4px 15px rgba(0,0,0,0.2);
}

.card-logo {
  width: 100px;
  height: 100px;
  object-fit: contain;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #4f5f52;
}

.experience-card h3 {
  margin: 10px 0 5px 0;
  color: #4f5f52;
}

.experience-card p {
  color: #4f5f52;
  font-style: italic;
  margin: 0;
}
</style>
</head>
<body>

<!-- Navigation Bar -->
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="resume.html">Resume</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- Intro Name Animation -->
<h1 id="name"><span id="text"></span><span class="cursor"></span></h1>

<!-- Experience Cards -->
<div class="cards-container">
  <!-- Example Card: Digital Extremes -->
  <div class="experience-card" onclick="location.href='experience-digitalextremes.html'">
    <img src="digitalextremes-logo.png" alt="Digital Extremes Logo" class="card-logo">
    <h3>Digital Extremes</h3>
    <p>Partner Marketing Coordinator</p>
  </div>

  <!-- Add more company cards here, e.g., another company -->
  <!--
  <div class="experience-card" onclick="location.href='experience-anothercompany.html'">
    <img src="another-logo.png" alt="Another Company Logo" class="card-logo">
    <h3>Another Company</h3>
    <p>Role Title</p>
  </div>
  -->
</div>

<!-- Typing Sound & Script -->
<audio id="typeSound" src="typing.mp3"></audio>
<script>
const name = "Jayden Truong";
const text = document.getElementById("text");
let i = 0;

function typeWriter(){
  if(i < name.length){
    text.textContent += name.charAt(i);
    i++;
    setTimeout(typeWriter,120);
  }
}

window.onload = typeWriter;
</script>

</body>
</html>
