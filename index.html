<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jayden Truong</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#F2E4E7,#B7C9B6);
  font-family:'Press Start 2P', cursive;
}
#name{
  font-size:40px;
  color:#4f5f52;
  text-align:center;
  line-height:1.6;
}
.cursor{
  border-right:4px solid #4f5f52;
  animation:blink 1s infinite;
}
@keyframes blink{
  0%{border-color:transparent}
  50%{border-color:#4f5f52}
  100%{border-color:transparent}
}
</style>
</head>
<body>
<h1 id="name">
  <span id="text"></span><span class="cursor"></span>
</h1>

<audio id="typeSound" src="typing.mp3" preload="auto"></audio>

<script>
const name = "Jayden Truong";
const text = document.getElementById("text");
const sound = document.getElementById("typeSound");
let i = 0;

// Calculate total duration for typing animation
const typingSpeed = 120; // ms per letter
const totalDuration = name.length * typingSpeed;

// Start typing and sound automatically
window.onload = () => {
    // Play the sound once
    sound.play();

    // Stop the sound exactly when typing finishes
    setTimeout(() => {
        sound.pause();
        sound.currentTime = 0;
    }, totalDuration);

    // Type out the letters
    function typeWriter(){
        if(i < name.length){
            text.textContent += name.charAt(i);
            i++;
            setTimeout(typeWriter, typingSpeed);
        }
    }
    typeWriter();
};
</script>
</body>
</html>
