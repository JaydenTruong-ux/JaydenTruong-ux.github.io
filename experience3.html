<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sephora - Jayden Truong</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Comfortaa', cursive;
  background: linear-gradient(135deg,#F2E4E7,#B7C9B6);
  display:flex;
  flex-direction: column;
  align-items: center;
  min-height:100vh;
  padding-bottom:70px;
}

/* Navigation Bar */
nav {
  background:#B7C9B6;
  width:100%;
  padding:25px 0;
  display:flex;
  justify-content:center;
  gap:50px;
}

nav a {
  font-family:'Press Start 2P', cursive;
  text-decoration:none;
  color:#4f5f52;
  border:2px solid #4f5f52;
  padding:10px 16px;
  border-radius:6px;
  transition: all 0.2s;
}

nav a:hover {
  background:#4f5f52;
  color:#F2E4E7;
}

nav a::after {
  content:"↗"; 
  display:none;
  margin-left:5px;
}

nav a:hover::after {
  display:inline;
}

/* Mission Card */
.mission-card {
  background:#F2E4E7;
  border:2px solid #4f5f52;
  border-radius:12px;
  max-width:900px;
  width:90%;
  margin-top:50px;
  padding:40px;
  box-shadow:0px 6px 12px rgba(0,0,0,0.15);
}

.mission-card img {
  width:150px;
  height:150px;
  object-fit:contain;
  display:block;
  margin:0 auto 20px auto;
}

.mission-card h1 {
  font-family:'Press Start 2P', cursive;
  text-align:center;
  color:#4f5f52;
  margin-bottom:15px;
  font-size:34px;
}

.mission-card h2 {
  font-family:'Press Start 2P', cursive;
  color:#4f5f52;
  margin-top:30px;
  margin-bottom:10px;
  font-size:22px;
}

.mission-card p {
  font-family:'Comfortaa', cursive;
  font-size:18px;
  line-height:1.8;
  margin:5px 0;
}

.stats-box {
  margin-top:20px;
}

.stat {
  margin:15px 0;
  font-size:14px;
}

.bar {
  background:#E4E4E4;
  border:2px solid #4f5f52;
  border-radius:6px;
  width:100%;
  height:18px;
  margin-top:4px;
}

.progress {
  background:#4f5f52;
  height:100%;
  width:0%;
  transition: width 1s ease-in-out;
}
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="index.html">HOME</a>
  <a href="resume.html" target="_blank">RESUME</a>
  <a href="contact.html">CONTACT</a>
</nav>

<!-- Mission Card: Sephora -->
<div class="mission-card">
  <img src="sephora-logo.png" alt="Sephora Logo">
  <h1>MISSION: Sephora</h1>
  <p>ROLE: Brand Communications</p>
  <p>STATUS: INCOMING / COMING SOON</p>
  <p>DURATION: May 2026 – Ongoing</p>

  <h2>OBJECTIVES:</h2>
  <ul>
    <li>To Be Continued…</li>
  </ul>

  <h2>SKILLS TO UNLOCK:</h2>
  <div class="stats-box">
    <div class="stat">Communication
      <div class="bar"><div class="progress" style="width:80%;"></div></div>
    </div>
    <div class="stat">Brand Strategy
      <div class="bar"><div class="progress" style="width:80%;"></div></div>
    </div>
    <div class="stat">Marketing
      <div class="bar"><div class="progress" style="width:80%;"></div></div>
    </div>
    <div class="stat">Teamwork
      <div class="bar"><div class="progress" style="width:80%;"></div></div>
    </div>
    <div class="stat">Project Coordination
      <div class="bar"><div class="progress" style="width:80%;"></div></div>
    </div>
  </div>
</div>

<script>
window.onload = () => {
  // Animate stats
  document.querySelectorAll('.progress').forEach((bar) => {
    const width = bar.style.width;
    bar.style.width = '0%';
    setTimeout(() => { bar.style.width = width; }, 200);
  });
};
</script>

</body>
</html>
