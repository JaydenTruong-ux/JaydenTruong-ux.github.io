<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sephora Experience</title>

<!-- Google Font Comfortaa -->
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">

<style>
/* --- Body & Theme --- */
body {
  margin:0;
  font-family: 'Comfortaa', cursive;
  background: linear-gradient(135deg,#F2E4E7,#B7C9B6);
  display:flex;
  flex-direction: column;
  align-items: center;
  min-height:100vh;
  padding-bottom: 50px;
}

/* --- Navigation Bar --- */
nav {
  background: #B7C9B6;
  width:100%;
  padding: 20px 0;
}

nav ul {
  display: flex;
  justify-content: center;
  gap: 50px;
  list-style: none;
  margin: 0;
  padding: 0;
}

nav ul li a {
  text-decoration: none;
  color: #4f5f52;
  font-weight: bold;
  transition: color 0.2s;
}

nav ul li a:hover {
  color: #F2E4E7;
}

/* --- Page Header --- */
h1 {
  text-align: center;
  color: #4f5f52;
  margin: 40px auto 20px auto;
  font-size: 36px;
  line-height: 1.4;
}

p.employment-dates {
  text-align: center;
  font-style: italic;
  color: #4f5f52;
  margin-bottom: 40px;
  font-size: 18px;
}

/* --- Company Logo Box --- */
.logo-box {
  background: #E3F0E1;
  border-radius: 15px;
  padding: 10px;
  border: 2px solid #4f5f52;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 60px 0 30px 0;
}

img.company-logo {
  width: 180px;
  height: 180px;
  object-fit: contain;
}

/* --- Company Website Link --- */
a.company-link {
  color:#4f5f52;
  text-decoration: underline;
  font-weight: bold;
  text-align: center;
  display: block;
  margin-bottom: 50px;
  font-size: 18px;
}

/* --- Two-column content --- */
.content-container {
  display: flex;
  flex-wrap: wrap;
  max-width: 1000px;
  gap: 50px;
  padding: 0 20px;
  margin-bottom: 50px;
}

.left-column {
  flex: 2;
  min-width: 320px;
}

.right-column {
  flex: 1;
  min-width: 280px;
  background: #E3F0E1; 
  border-radius: 15px;
  padding: 20px;           
  box-shadow: 2px 2px 12px rgba(0,0,0,0.15);
  max-height: fit-content;  
}

.left-column ul, .right-column ul {
  padding-left: 20px;
  margin-top: 10px;
  line-height: 1.8; 
  font-size: 17px;
}

h2 {
  color: #4f5f52;
  margin-bottom: 20px;
  font-size: 22px;
}

.right-column h2 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 24px;
}
</style>
</head>
<body>

<!-- Navigation Bar -->
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="resume.html">Resume</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- Company Logo Box -->
<div class="logo-box">
  <img src="sephora-logo.png" alt="Sephora Logo" class="company-logo">
</div>

<!-- Job Title and Dates -->
<h1>Brand Communications @ Sephora</h1>
<p class="employment-dates">May 2026 – Ongoing</p>

<!-- Company Website Link -->
<a href="https://www.sephora.com/" target="_blank" class="company-link">
  Visit Company Website
</a>

<!-- Two-column content -->
<div class="content-container">
  <!-- What I Did -->
  <div class="left-column">
    <h2>What I Did:</h2>
    <ul>
      <li>To Be Continued...</li>
    </ul>
  </div>

  <!-- Skills Learned -->
  <div class="right-column">
    <h2>Skills I Will Learn</h2>
    <ul>
      <li>To Be Continued...</li>
    </ul>
  </div>
</div>

</body>
</html>
